name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" Info.plist

      - name: Build for Apple Silicon (arm64)
        run: swift build -c release --arch arm64

      - name: Build for Intel (x86_64)
        run: swift build -c release --arch x86_64

      - name: Convert DMG background SVG to PNG
        run: |
          brew install librsvg
          rsvg-convert -w 720 -h 480 Assets/dmg_bg.svg -o Assets/dmg_bg.png

      - name: Create app bundles
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          create_app_bundle() {
            local ARCH_LABEL="$1"
            local BINARY_PATH="$2"
            local BUNDLE_DIR="Build/${ARCH_LABEL}"
            local APP_BUNDLE="${BUNDLE_DIR}/GoldPrice.app"
            local CONTENTS_DIR="${APP_BUNDLE}/Contents"

            mkdir -p "${CONTENTS_DIR}/MacOS" "${CONTENTS_DIR}/Resources"
            cp -f "${BINARY_PATH}" "${CONTENTS_DIR}/MacOS/GoldPrice"
            cp -f "Info.plist" "${CONTENTS_DIR}/"
            cp -f "Assets/AppIcon.icns" "${CONTENTS_DIR}/Resources/"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon.icns" "${CONTENTS_DIR}/Info.plist"
            echo "APPL????" > "${CONTENTS_DIR}/PkgInfo"
            chmod +x "${CONTENTS_DIR}/MacOS/GoldPrice"
          }

          create_app_bundle "arm64"  ".build/arm64-apple-macosx/release/GoldPrice"
          create_app_bundle "x86_64" ".build/x86_64-apple-macosx/release/GoldPrice"

      - name: Create ZIP packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for ARCH in arm64 x86_64; do
            cd "Build/${ARCH}"
            zip -rq "../../GoldPrice-${VERSION}-macOS-${ARCH}.zip" GoldPrice.app
            cd ../..
          done

      - name: Create DMG packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          create_dmg() {
            local ARCH="$1"
            local DMG_NAME="GoldPrice-${VERSION}-macOS-${ARCH}.dmg"
            local TMP_DMG="tmp-${ARCH}.dmg"
            local VOL_NAME="GoldPrice"
            local MOUNT_DIR="/Volumes/${VOL_NAME}"

            # 确保没有残留挂载
            hdiutil detach "${MOUNT_DIR}" -force 2>/dev/null || true

            hdiutil create -volname "${VOL_NAME}" -srcfolder "Build/${ARCH}/GoldPrice.app" -ov -format UDRW "${TMP_DMG}" -quiet
            hdiutil attach "${TMP_DMG}" -readwrite -noverify -noautoopen
            sleep 2

            ln -s /Applications "${MOUNT_DIR}/Applications"
            mkdir -p "${MOUNT_DIR}/.background"
            cp -f "Assets/dmg_bg.png" "${MOUNT_DIR}/.background/"

            osascript -e "tell application \"Finder\"" \
              -e "tell disk \"${VOL_NAME}\"" \
              -e "open" \
              -e "set current view of container window to icon view" \
              -e "set toolbar visible of container window to false" \
              -e "set statusbar visible of container window to false" \
              -e "set the bounds of container window to {360, 100, 1080, 580}" \
              -e "set theViewOptions to the icon view options of container window" \
              -e "set arrangement of theViewOptions to not arranged" \
              -e "set icon size of theViewOptions to 80" \
              -e "set background picture of theViewOptions to file \".background:dmg_bg.png\"" \
              -e "set position of item \"GoldPrice.app\" of container window to {220, 240}" \
              -e "set position of item \"Applications\" of container window to {520, 240}" \
              -e "update without registering applications" \
              -e "delay 3" \
              -e "close" \
              -e "end tell" \
              -e "end tell"

            sleep 3
            hdiutil detach "${MOUNT_DIR}" -force
            hdiutil convert "${TMP_DMG}" -format UDZO -imagekey zlib-level=9 -o "${DMG_NAME}" -quiet
            rm -f "${TMP_DMG}"
          }

          create_dmg "arm64"
          create_dmg "x86_64"

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: GoldPrice v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            GoldPrice-${{ steps.version.outputs.version }}-macOS-arm64.dmg
            GoldPrice-${{ steps.version.outputs.version }}-macOS-arm64.zip
            GoldPrice-${{ steps.version.outputs.version }}-macOS-x86_64.dmg
            GoldPrice-${{ steps.version.outputs.version }}-macOS-x86_64.zip
